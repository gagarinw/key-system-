<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Key System</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
        font-family: Arial, sans-serif;
        color: white;
    }

    .card {
        width: 400px;
        padding: 25px;
        border-radius: 18px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        text-align: center;
    }

    h1 {
        margin-bottom: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.03);
    }

    .beta {
        background: linear-gradient(90deg, #00c853, #64dd17);
        color: black;
    }

    .admin {
        background: linear-gradient(90deg, #ff1744, #d50000);
        color: white;
    }

    .lang {
        background: rgba(255,255,255,0.1);
        color: white;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: white;
        text-align: center;
    }

    .result {
        margin-top: 12px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255,255,255,0.08);
        font-size: 14px;
        word-break: break-all;
        cursor: pointer;
    }
</style>

</head>

<body>

<div class="card">

    <h1 id="title">🔑 Key System</h1>

    <button class="lang" onclick="switchLang()">🌐 Language</button>

    <button class="beta" id="btnBeta" onclick="gen()">Generate Beta Key</button>

    <input id="pass" placeholder="Admin password">

    <button class="admin" id="btnAdmin" onclick="genAdmin()">Generate Admin Key</button>

    <div class="result" id="result" onclick="copyKey()">
        Result
    </div>

</div>

<script>

let lang = "en";
let lastKey = "";

// 🌍 Тексты
const text = {
    en: {
        title: "Key System",
        beta: "Generate Beta Key",
        admin: "Generate Admin Key",
        pass: "Admin password",
        result: "Result",
        copied: "Copied!"
    },
    ru: {
        title: "Система ключей",
        beta: "Сгенерировать Beta ключ",
        admin: "Сгенерировать Admin ключ",
        pass: "Пароль админа",
        result: "Результат",
        copied: "Скопировано!"
    }
};

// 🌐 смена языка
function switchLang() {
    lang = lang === "en" ? "ru" : "en";

    document.getElementById("title").innerText = "🔑 " + text[lang].title;
    document.getElementById("btnBeta").innerText = text[lang].beta;
    document.getElementById("btnAdmin").innerText = text[lang].admin;
    document.getElementById("pass").placeholder = text[lang].pass;
    document.getElementById("result").innerText = text[lang].result;
}

// 🔑 beta key
async function gen() {
    let res = await fetch("/api/generate", { method: "POST" });
    let data = await res.json();

    lastKey = data.key;
    document.getElementById("result").innerText =
        "Beta: " + data.key;
}

// 🔴 admin key
async function genAdmin() {
    let password = document.getElementById("pass").value;

    let res = await fetch("/api/generate-admin", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ password })
    });

    let text = await res.text();

    lastKey = text;
    document.getElementById("result").innerText =
        "Admin: " + text;
}

// 📋 копирование
function copyKey() {
    if (!lastKey) return;

    navigator.clipboard.writeText(lastKey);

    alert(text[lang].copied);
}

</script>

</body>
</html>
